name: C++ CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Updated to v4 for better performance

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ build-essential libopencv-dev

    - name: Install ONNX Runtime
      run: |
        ORT_VERSION=1.17.1
        # Download and extract ONNX Runtime
        curl -L -O https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz
        tar -xzf onnxruntime-linux-x64-${ORT_VERSION}.tgz
        # Set environment variable for subsequent steps
        echo "ONNXRUNTIME_ROOT=${{ github.workspace }}/onnxruntime-linux-x64-${ORT_VERSION}" >> $GITHUB_ENV

    - name: Configure and Build
      run: |
        # Ensure we start fresh
        rm -rf build
        mkdir build && cd build
        # Pass the ONNX path to CMake
        cmake .. -DONNXRUNTIME_ROOT_DIR=${{ env.ONNXRUNTIME_ROOT }}
        make -j$(nproc)
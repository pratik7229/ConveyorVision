name: C++ CI Build

on:
  push:
    branches: ["main"]
  pull_requests:
    branches: ["main"]

jobs:
  builds:
    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout Code
      uses: actions/checkout@v3

    - name:
      run: |
        sudo apt update
        sudo apt-get install -y cmake g++ build-essential libopencv-dev

    - name: Configure CMake
      run: cmake -B build -S .


    - name: Build C++ Project
      run: cmake --build build --config Release
name: C++ CI Build

# Trigger this process every time you push code to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Spin up a virtual Linux machine
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download your repository code into the virtual machine
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step 2: Install the tools needed to compile computer vision C++ code
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ build-essential libopencv-dev

    - name: Install ONNX Runtime
        run: |
          ORT_VERSION=1.17.1
          curl -L -O https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz
          tar -xzf onnxruntime-linux-x64-${ORT_VERSION}.tgz
          echo "ONNXRUNTIME_ROOT=${{ github.workspace }}/onnxruntime-linux-x64-${ORT_VERSION}" >> $GITHUB_ENV

    - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake .. -DONNXRUNTIME_ROOT_DIR=${{ env.ONNXRUNTIME_ROOT }}
          make -j$(nproc)
